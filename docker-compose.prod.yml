version: '3.8'

services:
  redis:
    image: redis:7
    restart: always

  backend:
    image: ${DOCKER_HUB_ID:-your-id}/quanty_trade-backend:${BACKEND_VERSION:-dev}
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/backend/data
    environment:
      - SERVER_PORT=8080
      - GIN_MODE=release
      - LOG_DIR=/app/backend/data/logs
      - STRATEGIES_DIR=/app/strategies
      - DB_TYPE=sqlite
      - DB_SQLITE_PATH=/app/backend/data/quanty.db
      - REDIS_ENABLED=true
      - REDIS_ADDR=redis:6379
      - REDIS_PREFIX=qt
      - EXCHANGE=binance
      - BINANCE_MARKET=usdm
    depends_on:
      - redis
    restart: always

  frontend:
    image: ${DOCKER_HUB_ID:-your-id}/quanty_trade-frontend:${FRONTEND_VERSION:-dev}
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always
