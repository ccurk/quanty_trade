version: '3.8'

services:
  redis:
    image: redis:7
    restart: always

  backend:
    image: ${DOCKER_HUB_ID:-your-id}/quanty_trade-backend:${BACKEND_VERSION:-dev}
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/backend/data
    environment:
      - PORT=8080
      - DB_DRIVER=sqlite
      - REDIS_ENABLED=true
      - REDIS_ADDR=redis:6379
      - REDIS_PREFIX=qt
    depends_on:
      - redis
    restart: always

  frontend:
    image: ${DOCKER_HUB_ID:-your-id}/quanty_trade-frontend:${FRONTEND_VERSION:-dev}
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always
