version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - backend_data:/app/backend/data
    environment:
      - PORT=8080
      # - DB_DRIVER=mysql # Uncomment if using MySQL
      # - DB_DSN=user:pass@tcp(db:3306)/quanty?charset=utf8mb4&parseTime=True&loc=Local
    restart: always

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always

volumes:
  backend_data:
